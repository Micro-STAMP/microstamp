  auth-db:
    image: mysql:8.4
    container_name: auth-db
    restart: always
    command: mysqld --mysql-native-password=ON --character-set-server=utf8mb4
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=microstamp
      - MYSQL_ROOT_HOST=%
      - MYSQL_TCP_PORT=3307
    ports:
      - "3307:3307"
    expose:
      - "3307"
    networks:
      - microstamp-network
  step1-db:
    image: mysql:8.4
    container_name: step1-db
    restart: always
    command: mysqld --mysql-native-password=ON --character-set-server=utf8mb4
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=step1
      - MYSQL_ROOT_HOST=%
      - MYSQL_TCP_PORT=3308
    ports:
      - "3308:3308"
    expose:
      - "3308"
    networks:
      - microstamp-network
