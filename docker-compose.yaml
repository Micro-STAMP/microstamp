  microstamp-service-registry:
    image: gabrielfrancelino/microstamp-service-registry:0.0.1-SNAPSHOT
    container_name: microstamp-service-registry
    ports:
      - "8761:8761"
    networks:
      - microstamp-network
  microstamp-api-gateway:
    image: gabrielfrancelino/microstamp-api-gateway:0.0.1-SNAPSHOT
    container_name: microstamp-api-gateway
    ports:
      - "9191:9191"
    depends_on:
      - microstamp-service-registry
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://microstamp-service-registry:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - microstamp-network
  microstamp-authorization-server:
    image: gabrielfrancelino/microstamp-authorization-server:0.0.1-SNAPSHOT
    container_name: microstamp-authorization-server
    restart: always
    ports:
      - "9000:9000"
    depends_on:
      - microstamp-service-registry
      - auth-db
    environment:
      - TZ=America/Sao_Paulo
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://microstamp-service-registry:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://auth-db:3307/microstamp?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_FLYWAY_URL=jdbc:mysql://auth-db:3307/microstamp?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
      - SPRING_FLYWAY_USER=root
      - SPRING_FLYWAY_PASSWORD=123456
    networks:
      - microstamp-network
  microstamp-step1:
    image: gabrielfrancelino/microstamp-step1-microservice:1.0.0
    container_name: microstamp-step1
    restart: always
    ports:
      - "8091:8091"
    depends_on:
      - microstamp-service-registry
      - step1-db
    environment:
        - TZ=America/Sao_Paulo
        - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://microstamp-service-registry:8761/eureka/
        - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
        - SPRING_DATASOURCE_URL=jdbc:mysql://step1-db:3308/step1?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
        - SPRING_DATASOURCE_USERNAME=root
        - SPRING_DATASOURCE_PASSWORD=123456
        - SPRING_FLYWAY_ENABLED=false
        - SPRING_FLYWAY_URL=jdbc:mysql://step1-db:3308/step1?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
        - SPRING_FLYWAY_USER=root
        - SPRING_FLYWAY_PASSWORD=123456
        - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://microstamp-authorization-server:9000
    networks:
      - microstamp-network
networks:
  microstamp-network:
    driver: bridge