services:
#  db:
#    image: mysql:8.4
#    container_name: db
#    restart: unless-stopped
#    ports:
#      - "3306:3306"
#    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
#    volumes:
#      - ./docker/provision/mysql/init:/docker-entrypoint-initdb.d
#    environment:
#      MYSQL_ROOT_PASSWORD: 123456
#    networks:
#      - microstamp-network
  auth-db:
    image: mysql:8.4
    container_name: auth-db
    restart: always
    command: mysqld --mysql-native-password=ON --character-set-server=utf8mb4
    environment:
      - TZ=America/Sao_Paulo
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=microstamp
      - MYSQL_ROOT_HOST=%
      - MYSQL_TCP_PORT=3307
    ports:
      - "3307:3307"
    expose:
      - "3307"
    networks:
      - microstamp-network
  microstamp-service-registry:
    image: gabrielfrancelino/microstamp-service-registry:0.0.1-SNAPSHOT
    container_name: microstamp-service-registry
    ports:
      - "8761:8761"
    networks:
      - microstamp-network
  microstamp-api-gateway:
    image: gabrielfrancelino/microstamp-api-gateway:0.0.1-SNAPSHOT
    container_name: microstamp-api-gateway
    ports:
      - "9191:9191"
    depends_on:
      - microstamp-service-registry
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://microstamp-service-registry:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - microstamp-network
  microstamp-authorization-server:
    image: gabrielfrancelino/microstamp-authorization-server:0.0.1-SNAPSHOT
    container_name: microstamp-authorization-server
    restart: always
    ports:
      - "9000:9000"
    depends_on:
      - microstamp-service-registry
      - auth-db
    environment:
      - TZ=America/Sao_Paulo
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://microstamp-service-registry:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SPRING_DATASOURCE_URL=jdbc:mysql://auth-db:3307/microstamp?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_FLYWAY_URL=jdbc:mysql://auth-db:3307/microstamp?useSSL=false&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2&allowPublicKeyRetrieval=false
      - SPRING_FLYWAY_USER=root
      - SPRING_FLYWAY_PASSWORD=123456
    networks:
      - microstamp-network
networks:
  microstamp-network:
    driver: bridge